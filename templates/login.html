<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Remisería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #212529; height: 100vh; display: flex; align-items: center; }
        .login-card { max-width: 350px; width: 100%; margin: auto; border-radius: 15px; }
        .pin-display { font-size: 2rem; letter-spacing: 10px; text-align: center; background: #eee; border-radius: 10px; margin-bottom: 20px; padding: 10px; }
        .btn-num { width: 70px; height: 70px; font-size: 1.5rem; margin: 5px; border-radius: 50%; }
    </style>
</head>
<body>
    <div class="card login-card shadow-lg">
        <div class="card-body text-center">
            <h3 class="mb-4">🚖 Acceso Operador</h3>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST" id="login-form">
                <input type="password" name="pin" id="pin-input" readonly class="form-control pin-display" placeholder="****" required>
                
                <div class="d-flex flex-wrap justify-content-center">
                    {% for i in range(1, 10) %}
                    <button type="button" class="btn btn-outline-dark btn-num" onclick="addNum('{{i}}')">{{i}}</button>
                    {% endfor %}
                    <button type="button" class="btn btn-danger btn-num" onclick="clearPin()">C</button>
                    <button type="button" class="btn btn-outline-dark btn-num" onclick="addNum('0')">0</button>
                    <button type="submit" class="btn btn-success btn-num">OK</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const input = document.getElementById('pin-input');
        function addNum(n) {
            if (input.value.length < 8) {
                input.value += n;
            }
        }
        function clearPin() {
            input.value = '';
        }
    </script>
</body>
</html>
