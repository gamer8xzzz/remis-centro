<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de usuario</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    .toggle-password {
      cursor: pointer;
      position: absolute;
      right: 15px;
      top: 38px;
      z-index: 2;
    }
  </style>
</head>
<body class="bg-light">

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-header bg-success text-white">
            <h4 class="mb-0"><i class="bi bi-person-plus-fill me-2"></i>Registro de usuario</h4>
          </div>
          <div class="card-body">

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="alert alert-warning alert-dismissible fade show" role="alert">
                  {{ messages[0] }}
                  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
                </div>
              {% endif %}
            {% endwith %}

            <form method="POST" onsubmit="showLoading()">
              <div class="mb-3">
                <label for="nombre" class="form-label">Nombre completo</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                  <input type="text" name="nombre" id="nombre" class="form-control" placeholder="Tu nombre" required>
                </div>
              </div>

              <div class="mb-3">
                <label for="username" class="form-label">Usuario</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                  <input type="text" name="username" id="username" class="form-control" placeholder="Nombre de usuario" required>
                </div>
              </div>

              <div class="mb-3 position-relative">
                <label for="password" class="form-label">Contraseña</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                  <input type="password" name="password" id="password" class="form-control" placeholder="Contraseña segura" required>
                </div>
                <i class="bi bi-eye-slash toggle-password" onclick="togglePassword()"></i>
              </div>

              <div class="mb-3">
                <label for="rol" class="form-label">Tipo de usuario</label>
                <select name="rol" id="rol" class="form-select" required>
                  <option value="">Seleccioná un rol</option>
                  <option value="cliente">Cliente</option>
                  <option value="admin">Administrador</option>
                </select>
              </div>

              <button type="submit" class="btn btn-success w-100" id="registerBtn">
                <i class="bi bi-person-check me-1"></i>Registrarme
              </button>
            </form>

            <div class="mt-3 text-center">
              <a href="{{ url_for('login') }}">¿Ya tenés cuenta? Iniciá sesión</a>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const icon = document.querySelector('.toggle-password');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
      } else {
        passwordInput.type = 'password';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
      }
    }

    function showLoading() {
      const btn = document.getElementById('registerBtn');
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Registrando...';
      btn.disabled = true;
    }
  </script>

</body>
</html>
